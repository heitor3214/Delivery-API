spring:
  application:
    name: APIEntrega

  datasource:
    url: jdbc:postgresql://localhost:5432/api_entrega
    username: heitor
    password: 123
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: HikariPoolEntrega

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect